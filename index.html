<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ember &mdash; Kodi add-on</title>
    <style>
        :root { color-scheme: dark; }
        body {
            margin: 0; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            background: #14110f; color: #f3ede7;
        }
        main { max-width: 32rem; padding: 2.5rem 1.5rem; text-align: center; }
        img { width: 96px; height: 96px; border-radius: 18px; }
        h1 { margin: 1rem 0 0.25rem; font-size: 2rem; }
        p.tag { margin: 0 0 2rem; color: #b9a89a; }
        a.btn {
            display: inline-block; padding: 0.75rem 1.5rem; border-radius: 10px;
            background: #e8662a; color: #fff; text-decoration: none; font-weight: 600;
        }
        a.btn:hover { background: #ff7836; }
        ol { text-align: left; margin: 2rem auto 0; max-width: 26rem; line-height: 1.7; color: #d8ccc1; }
        code { background: #2a241f; padding: 0.1rem 0.4rem; border-radius: 5px; }
    </style>
</head>
<body>
    <main>
        <img src="icon.png" alt="Ember icon">
        <h1>Ember</h1>
        <p class="tag">Lightweight movie &amp; TV streaming for Kodi.</p>

        <a class="btn" href="ember.repository.zip" download>Download repository</a>

        <ol>
            <li>Download the repository zip above.</li>
            <li>Kodi &rarr; Add-ons &rarr; <em>Install from zip file</em> &rarr; pick it.</li>
            <li>Add-ons &rarr; <em>Install from repository</em> &rarr; <code>Ember Repository</code> &rarr; Video add-ons &rarr; <code>Ember</code>.</li>
        </ol>
    </main>
</body>
</html>
